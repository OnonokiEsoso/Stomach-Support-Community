<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />

<body class="station-page-nagoya">

      <div class="brand">
        <span class="brand-mark" aria-hidden="true">🚻</span>
        <div class="brand-text">
          <div class="brand-name">Stomach Pain Save</div>
          <div class="brand-sub">腹痛持ちのための駅トイレマップ</div>

      </div>
      <nav class="nav">
        <a class="btn ghost" href="../index.html">一覧へ戻る</a>

    </div>

  <main class="section">
    <div class="container">
      <div class="section-head station-title">

      <div class="card">

          <dl class="kv">

            </div>
            <div>
              <dt>小期待値</dt>
              <dd>★★★★★</dd>
            </div>
            <div>

              <dd>新</dd>

        </div>

      <p class="muted" style="margin-top:12px;">Photo: Tomio344456 / CC BY-SA 4.0</p>
