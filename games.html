<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stomach Pain Save | Mini Games</title>
  <link rel="stylesheet" href="stomach_pain.css" />
</head>
<body class="games-page">
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">🚻</span>
        <div class="brand-text">
          <div class="brand-name">Stomach Pain Save</div>
          <div class="brand-sub">腹痛持ちのための駅トイレマップ</div>
        </div>
      </div>
      <nav class="nav">
        <a class="btn ghost" href="index.html">戻る</a>
      </nav>
    </div>
  </header>

  <main class="games-wrap">
    <div class="container">
      <div class="section-head">
        <h2>Mini Games</h2>
        <p class="muted">短時間で遊べるミニゲーム。</p>
      </div>

      <div class="games-grid single-game-grid">
        <section class="game-card" aria-labelledby="memory-title">
          <h3 id="memory-title">絵合わせ</h3>
          <div class="form-row">
            <label for="memory-size">サイズ</label>
            <select id="memory-size" name="memory-size">
              <option value="4x4">4*4</option>
              <option value="5x5">5*5</option>
              <option value="6x6">6*6</option>
            </select>
          </div>
          <div class="game-head">
            <button class="btn small" type="button" id="memory-reset">リセット</button>
          </div>
          <p class="game-status" id="memory-turn-counter">試行回数: 0</p>
          <div class="game-board memory-board" id="memory-board" aria-label="絵合わせ盤面"></div>
          <p class="game-status" id="memory-status">4x4 / 8ペア</p>
        </section>
      </div>
    </div>
  </main>

  <script>
    const memoryBoard = document.getElementById("memory-board");
    const memoryCard = document.querySelector(".game-card");
    const memoryStatus = document.getElementById("memory-status");
    const memoryTurnCounter = document.getElementById("memory-turn-counter");
    const memoryReset = document.getElementById("memory-reset");
    const memorySize = document.getElementById("memory-size");
    const memoryIcons = ["▲", "●", "■", "★", "◆", "❤", "✿", "☂"];
    const memoryLetters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    let memoryTiles = [];
    let memoryFlipped = [];
    let memoryMatched = 0;
    let memoryLocked = false;
    let memoryTurns = 0;
    let memoryPairCount = 8;
    let memoryBoardSize = 4;

    const getBoardSize = () => {
      const raw = memorySize?.value || "4x4";
      const parsed = Number(raw.split("x")[0]);
      return Number.isFinite(parsed) && parsed > 1 ? parsed : 4;
    };

    const getMemorySymbols = (pairCount) => {
      const pool = [...memoryIcons, ...memoryLetters];
      if (pairCount > pool.length) {
        return Array.from({ length: pairCount }, (_, i) => String(i + 1));
      }
      return pool.slice(0, pairCount);
    };

    const buildMemoryBoard = () => {
      memoryBoard.innerHTML = "";
      const existingLayer = memoryCard?.querySelector(".confetti-layer");
      if (existingLayer) {
        existingLayer.remove();
      }
      memoryTiles = [];
      memoryFlipped = [];
      memoryMatched = 0;
      memoryLocked = false;
      memoryTurns = 0;
      memoryTurnCounter.textContent = "試行回数: 0";
      memoryBoardSize = getBoardSize();
      const totalCells = memoryBoardSize * memoryBoardSize;
      const hasFreeTile = totalCells % 2 === 1;
      memoryPairCount = Math.floor(totalCells / 2);
      memoryBoard.style.gridTemplateColumns = `repeat(${memoryBoardSize}, 1fr)`;
      memoryStatus.textContent = hasFreeTile
        ? `${memoryBoardSize}x${memoryBoardSize} / ${memoryPairCount}ペア + FREE1`
        : `${memoryBoardSize}x${memoryBoardSize} / ${memoryPairCount}ペア`;

      const symbols = getMemorySymbols(memoryPairCount);
      const pairs = [...symbols, ...symbols];
      if (hasFreeTile) {
        pairs.push("FREE");
      }
      pairs.sort(() => Math.random() - 0.5);

      pairs.forEach((icon, index) => {
        const tile = document.createElement("button");
        tile.className = "tile";
        tile.type = "button";
        tile.dataset.index = String(index);
        tile.dataset.icon = icon;
        if (icon === "FREE") {
          tile.classList.add("revealed", "matched");
          tile.textContent = "FREE";
          tile.disabled = true;
        }
        tile.addEventListener("click", () => flipMemoryTile(tile));
        memoryTiles.push(tile);
        memoryBoard.appendChild(tile);
      });
    };

    const launchConfetti = () => {
      if (!memoryCard) return;
      const oldLayer = memoryCard.querySelector(".confetti-layer");
      if (oldLayer) {
        oldLayer.remove();
      }
      const layer = document.createElement("div");
      layer.className = "confetti-layer";
      const colors = ["#ff6b4a", "#f59e0b", "#10b981", "#38bdf8", "#e879f9", "#f43f5e", "#22d3ee"];
      for (let i = 0; i < 84; i += 1) {
        const piece = document.createElement("span");
        piece.className = "confetti-piece";
        const side = i % 2 === 0 ? 12 : 88;
        piece.style.left = `${side + (Math.random() - 0.5) * 18}%`;
        piece.style.backgroundColor = colors[i % colors.length];
        piece.style.width = `${6 + Math.random() * 5}px`;
        piece.style.height = `${8 + Math.random() * 8}px`;
        piece.style.setProperty("--dx", `${(Math.random() - 0.5) * 260}px`);
        piece.style.setProperty("--dy", `${150 + Math.random() * 200}px`);
        piece.style.setProperty("--rot", `${300 + Math.random() * 540}deg`);
        piece.style.animationDelay = `${Math.random() * 90}ms`;
        piece.style.animationDuration = `${520 + Math.random() * 520}ms`;
        layer.appendChild(piece);
      }
      memoryCard.appendChild(layer);
      setTimeout(() => {
        layer.remove();
      }, 1200);
    };

    const flipMemoryTile = (tile) => {
      if (memoryLocked || tile.classList.contains("matched") || tile.classList.contains("revealed")) {
        return;
      }
      tile.classList.add("revealed");
      tile.textContent = tile.dataset.icon;
      memoryFlipped.push(tile);
      if (memoryFlipped.length === 2) {
        checkMemoryPair();
      }
    };

    const checkMemoryPair = () => {
      const [first, second] = memoryFlipped;
      if (!first || !second) return;
      memoryTurns += 1;
      memoryTurnCounter.textContent = `試行回数: ${memoryTurns}`;
      if (first.dataset.icon === second.dataset.icon) {
        first.classList.add("matched");
        second.classList.add("matched");
        memoryMatched += 1;
        memoryFlipped = [];
        if (memoryMatched === memoryPairCount) {
          memoryStatus.textContent = "クリア！";
          launchConfetti();
        }
        return;
      }
      memoryLocked = true;
      setTimeout(() => {
        first.classList.remove("revealed");
        second.classList.remove("revealed");
        first.textContent = "";
        second.textContent = "";
        memoryFlipped = [];
        memoryLocked = false;
      }, 700);
    };

    memoryReset.addEventListener("click", buildMemoryBoard);
    memorySize.addEventListener("change", buildMemoryBoard);
    buildMemoryBoard();
  </script>
</body>
</html>
